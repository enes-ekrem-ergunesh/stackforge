services:
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs
    env_file:
      - .env
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      description: "Public reverse proxy entrypoint for frontend, API, and Swagger docs"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Service-to-service connection using Docker DNS
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB} # Use Docker secrets for production
      SWAGGER_PATH: /docs
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000" # Optional exposure for local development
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    labels:
      description: "NestJS API with Swagger docs"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:4200" # Optional exposure for local development/PWA testing
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:4200', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      description: "Angular PWA frontend served behind NGINX"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432" # Optional exposure for local development
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      description: "PostgreSQL database with persistent volume"

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    # For production, prefer Docker secrets or externalized pgpass provisioning.
    command: >
      sh -c "mkdir -p /backups &&
      echo \"db:5432:$${POSTGRES_DB}:$${POSTGRES_USER}:$${POSTGRES_PASSWORD}\" > /root/.pgpass &&
      chmod 600 /root/.pgpass &&
      while true; do
        FILE=/backups/backup-$(date -u +%Y%m%dT%H%M%SZ).sql.gz &&
        echo \"[backup] writing $${FILE}\" &&
        if PGPASSFILE=/root/.pgpass pg_dump -h db -U $${POSTGRES_USER} $${POSTGRES_DB} | gzip > $${FILE}; then
          echo \"[backup] completed $${FILE}\" &&
          find /backups -type f -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete;
        else
          echo \"[backup] failed to write $${FILE}\" >&2;
        fi &&
        sleep $${BACKUP_INTERVAL_SECONDS:-86400};
      done"
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    labels:
      description: "Periodic PostgreSQL dumps + volume backups"

  restore:
    image: postgres:16-alpine
    restart: "no"
    env_file:
      - .env
    command: ["sleep", "infinity"] # Exec into this container to run psql/pg_restore manually
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    labels:
      description: "On-demand restore helper (attach and run pg_restore/psql)"

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

volumes:
  db_data:
  certs:
  backup_data:
