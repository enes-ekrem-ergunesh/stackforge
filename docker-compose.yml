services:
  nginx:
    image: nginx:1.26.3-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    # Public entrypoint for the stack (keep exposed)
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs
    env_file:
      - .env
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      description: "Public reverse proxy entrypoint for frontend, API, and Swagger docs"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Service-to-service connection using Docker DNS
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB} # Use Docker secrets for production; avoid env credentials
      SWAGGER_PATH: /docs
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-3000}:3000"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    labels:
      description: "NestJS API with Swagger docs"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-4200}:4200"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:4200', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      description: "Angular PWA frontend served behind NGINX"

  db:
    image: postgres:16.8-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      description: "PostgreSQL database with persistent volume"

  backup:
    image: postgres:16.8-alpine
    restart: on-failure
    env_file:
      - .env
    # For production, prefer Docker secrets or externalized pgpass provisioning; this runtime file is for local/dev convenience.
    command: >
      sh -c "mkdir -p /backups &&
      PGPASS_PATH=$${PGPASSFILE:-/root/.pgpass} &&
      if [ -f /run/secrets/db_pgpass ]; then
        PGPASS_PATH=/run/secrets/db_pgpass;
      else
        echo \"db:5432:$${POSTGRES_DB}:$${POSTGRES_USER}:$${POSTGRES_PASSWORD}\" > $${PGPASS_PATH} &&
        chmod 600 $${PGPASS_PATH};
      fi &&
      while true; do
        FILE=/backups/backup-$(date -u +%Y-%m-%dT%H:%M:%SZ).sql.gz &&
        echo \"[backup] writing $${FILE}\" &&
      if PGPASSFILE=$${PGPASS_PATH} pg_dump -h db -U $${POSTGRES_USER} $${POSTGRES_DB} | gzip > $${FILE}; then
        find /backups -type f -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete;
        echo \"[backup] completed $${FILE}\";
      else
          echo \"[backup] failed to write $${FILE}\" >&2;
        fi &&
        sleep $${BACKUP_INTERVAL_SECONDS:-86400};
      done"
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    labels:
      description: "Periodic PostgreSQL dumps + volume backups"

  restore:
    image: postgres:16.8-alpine
    restart: "no"
    env_file:
      - .env
    command: ["sleep", "infinity"] # Exec into this container to run psql/pg_restore manually
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    labels:
      description: "On-demand restore helper (attach and run pg_restore/psql)"

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

volumes:
  db_data:
  certs:
  backup_data:
