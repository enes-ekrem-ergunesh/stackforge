worker_processes  auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    upstream frontend {
        server frontend:4200;
    }

    upstream backend {
        server backend:3000;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Local/dev default is HTTP to avoid startup failure when certs are not provisioned.
        # For production HTTPS, add a separate TLS server block on 443 with valid certificates
        # mounted at /etc/nginx/certs/fullchain.pem and /etc/nginx/certs/privkey.pem.

        # Basic health endpoint for container checks
        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        # Angular PWA (served by frontend container)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI API
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger docs
        location /docs {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
